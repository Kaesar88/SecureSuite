services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    hostname: ldap.local
    command: --loglevel info --copy-service
    environment:
      - LDAP_ORGANISATION=MiEmpresa
      - LDAP_DOMAIN=miempresa.local
      - LDAP_ADMIN_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - LDAP_CONFIG_PASSWORD=${LDAP_ADMIN_PASSWORD}
      - LDAP_BACKEND=mdb
      - LDAP_ADD_SCHEMAS=yes
      - LDAP_INCLUDE_SCHEMAS=core,cosine,inetorgperson,nis
      - LDAP_READ_ONLY_USER=false
      - LDAP_TLS=false
      - LDAP_REPLICATION=false
    volumes:
      - openldap_data:/var/lib/ldap
      - openldap_config:/etc/ldap/slapd.d
      - ./ldap/ldif/50-users.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-users.ldif
    ports:
      - "389:389"
    networks:
      - iam-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ldapsearch", "-x", "-H", "ldap://localhost", "-b", "dc=miempresa,dc=local", "-D", "cn=admin,dc=miempresa,dc=local", "-w", "${LDAP_ADMIN_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'


  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    container_name: secure_keycloak
    command:
      - start-dev
      - --spi-theme-static-max-age=-1
      - --spi-theme-cache-themes=false
      - --spi-theme-cache-templates=false
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_HOSTNAME=localhost
    depends_on:
      openldap:
        condition: service_healthy
    restart: on-failure
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/2cl-realm.json:/opt/keycloak/data/import/2cl-realm.json
      - ./keycloak/themes:/opt/keycloak/themes
    networks:
      - iam-net

  secureapi:
    build:
      context: ./SecureApi
      dockerfile: Dockerfile
    container_name: secure_api
    ports:
      - "5001:8080"
    depends_on:
      - keycloak
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - Keycloak__Authority=http://keycloak:8080/realms/2cl-realm
      - Keycloak__ClientId=secureapi
      - Keycloak__RequireHttpsMetadata=false
      - LDAP_SERVICE_URL=http://ldap-service:5050
      - LDAP_SERVICE_API_KEY=${LDAP_SERVICE_API_KEY}
    networks:
      - iam-net

  angular-app:
    build:
      context: ./my-angular-keycloak-app
      dockerfile: Dockerfile
    container_name: angular_app
    ports:
      - "4200:80"
    depends_on:
      - secureapi
    environment:
      - Keycloak__Url=http://keycloak:8080
      - Keycloak__Realm=2cl-realm
      - Keycloak__ClientId=angular-app
      - Api__BaseUrl=http://secureapi:8080
    networks:
      - iam-net


  ldap-service:
    build:
      context: ./ldap-service
      dockerfile: Dockerfile
    container_name: ldap-service
    ports:
      - "5050:5050"
    environment:
      - LDAP_HOST=openldap
      - LDAP_PORT=389
      - LDAP_ADMIN=cn=admin,dc=miempresa,dc=local
      - LDAP_PASS=${LDAP_ADMIN_PASSWORD}
      - LDAP_BASE_DN=dc=miempresa,dc=local
      - API_KEY=${LDAP_SERVICE_API_KEY}
    depends_on:
      openldap:
        condition: service_healthy
    networks:
      - iam-net
    restart: unless-stopped

  midpoint_data:
    image: postgres:16-alpine
    container_name: midpoint-db
    environment:
      - POSTGRES_PASSWORD=${MIDPOINT_DB_PASSWORD}
      - POSTGRES_USER=midpoint
      - POSTGRES_DB=midpoint
      - POSTGRES_INITDB_ARGS=--lc-collate=en_US.utf8 --lc-ctype=en_US.utf8
    networks:
      - iam-net
    volumes:
      - midpoint_data:/var/lib/postgresql/data
    restart: unless-stopped

  midpoint_init:
    image: evolveum/midpoint:${MP_VER:-latest}-alpine
    container_name: midpoint-init
    command: >
      bash -c "
      cd /opt/midpoint ;
      bin/midpoint.sh init-native ;
      bin/ninja.sh -B info >/dev/null 2>/tmp/ninja.log ;
      grep -q \"ERROR\" /tmp/ninja.log && (
      bin/ninja.sh run-sql --create --mode REPOSITORY ;
      bin/ninja.sh run-sql --create --mode AUDIT
      ) ||
      echo 'Repository init not needed.' ;
      "
    depends_on:
      - midpoint_data
    environment:
      - MP_SET_midpoint_repository_jdbcUsername=midpoint
      - MP_SET_midpoint_repository_jdbcPassword=${MIDPOINT_DB_PASSWORD}
      - MP_SET_midpoint_repository_jdbcUrl=jdbc:postgresql://midpoint_data:5432/midpoint
      - MP_SET_midpoint_repository_database=postgresql
      - MP_INIT_CFG=/opt/midpoint/var
    networks:
      - iam-net
    volumes:
      - midpoint_home:/opt/midpoint/var

  midpoint_server:
    image: evolveum/midpoint:${MP_VER:-latest}-alpine
    container_name: midpoint-server
    command: ["/opt/midpoint/bin/midpoint.sh", "container"]
    depends_on:
      midpoint_init:
        condition: service_completed_successfully
      midpoint_data:
        condition: service_started
      openldap:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      - MP_SET_midpoint_repository_jdbcUsername=midpoint
      - MP_SET_midpoint_repository_jdbcPassword=${MIDPOINT_DB_PASSWORD}
      - MP_SET_midpoint_repository_jdbcUrl=jdbc:postgresql://midpoint_data:5432/midpoint
      - MP_SET_midpoint_repository_database=postgresql
      - MP_SET_midpoint_administrator_initialPassword=${MIDPOINT_ADMIN_PASSWORD}
      - MP_UNSET_midpoint_repository_hibernateHbm2ddl=1
      - MP_NO_ENV_COMPAT=1
    networks:
      - iam-net
    volumes:
      - midpoint_home:/opt/midpoint/var
    restart: on-failure

networks:
  iam-net:
    driver: bridge

volumes:
  openldap_data:
  openldap_config:
  keycloak_data:
  midpoint_data:
  midpoint_home:
